apiVersion: apps/v1
kind: Deployment
metadata:
  name: monet-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: monet-api
  template:
    metadata:
      labels:
        app: monet-api
    spec:
      containers:
      - name: api
        image: ghcr.io/yourorg/monet:latest
        ports:
        - containerPort: 8000
        env:
        - name: MONET_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: monet-secrets
              key: jwt
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: monet-api
spec:
  selector:
    app: monet-api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monet-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monet-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
