    confidence_threshold: 0.7
    flash_stddev_mult: 2.0
    blur_edge_ratio: 0.3
  text:
    ocr_confidence: 50
  color:
    bw_saturation: 20
    desaturated_saturation: 35
    dark_luminance: 60
    bright_luminance: 200
    vibrant_saturation: 100

