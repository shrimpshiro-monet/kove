version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - monet_data:/tmp/monet
      - ./uploads:/tmp/monet-uploads
    depends_on: [redis]

  worker:
    build: .
    command: ["python", "-m", "monet.workers.render_worker"]
    env_file: .env
    volumes:
      - monet_data:/tmp/monet

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  monet_data:
